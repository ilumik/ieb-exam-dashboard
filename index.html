<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation, Entrepreneurship & Business Models - Exam Dashboard</title>
    <style>
        :root {
            --color-primary: #3b82f6;
            --color-primary-hover: #2563eb;
            --color-primary-light: #dbeafe;
            --color-bg: #fafbfc;
            --color-surface: #ffffff;
            --color-text: #0f172a;
            --color-text-secondary: #64748b;
            --color-border: #e2e8f0;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-bar {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--color-border);
        }

        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px var(--color-primary-light);
            transform: translateY(-1px);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 1.75rem;
            background: white;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .tab-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--color-surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--color-border);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }

        .card-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-theory { background: #dbeafe; color: #1e40af; }
        .badge-practice { background: #fef3c7; color: #92400e; }
        .badge-tools { background: #d1fae5; color: #065f46; }
        .badge-critical { background: #fee2e2; color: #991b1b; }

        .card-content {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .card-content ul {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .card-content li {
            margin: 0.5rem 0;
        }

        .key-point {
            background: #f8fafc;
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            margin: 1.25rem 0;
            border-left: 4px solid var(--color-primary);
            box-shadow: var(--shadow-sm);
        }
        
        .key-point strong {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1.2rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 1100px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--color-border);
        }
        
        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--color-primary);
        }
        
        .modal-content h3 {
            font-size: 1.4rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .modal-content p,
        .modal-content li {
            font-size: 1.15rem;
            line-height: 1.8;
        }
        
        .modal-content strong {
            color: var(--color-text);
            font-weight: 600;
        }
        
        .modal-content ul,
        .modal-content ol {
            margin: 1rem 0;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: var(--color-surface);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--color-surface);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary) 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--color-text-secondary);
            font-size: 1rem;
            margin-top: 0.75rem;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }
            
            .header {
                padding: 2rem 1rem;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 2rem 1.5rem;
                max-width: 95vw;
            }
            
            .modal-content h2 {
                font-size: 1.5rem;
            }
            
            .modal-content p,
            .modal-content li {
                font-size: 1.05rem;
            }
        }

        /* PDF Viewer Modal */
        .pdf-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
        }
        .pdf-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .pdf-modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }
        .pdf-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }
        .pdf-modal-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-text);
        }
        .pdf-modal-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .pdf-open-btn {
            padding: 0.4rem 0.9rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .pdf-open-btn:hover { background: var(--color-primary-hover); }
        .pdf-modal-close {
            background: none;
            border: none;
            font-size: 1.75rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .pdf-modal-close:hover { background: #f1f5f9; }
        .pdf-iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
        .pdf-fallback {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
        }
        .pdf-fallback p { color: var(--color-text-secondary); }
    </style>
</head>

                summary: "Four main types of innovation according to Oslo Manual 2018",
                details: `
                    <h2>Four Types of Innovation (Oslo Manual 2018)</h2>
                    <img src="https://user-gen-media-assets.s3.amazonaws.com/seedream_images/fc456009-5ea1-4195-9ead-c1ca8bfc9980.png" alt="Oslo Manual Four Types of Innovation" style="width: 100%; max-width: 600px; margin: 1rem auto; display: block; border-radius: 8px;">
                    <div class="key-point">
                        <strong>1. Product Innovation</strong>
                        <p>Introduction of a new or significantly improved good or service with respect to characteristics or intended uses.</p>
                        <ul>
                            <li>Includes significant improvements in technical specifications, components, materials, software</li>
                            <li>Example: First smartphone with touchscreen</li>
                        </ul>
                    </div>
                    <div class="key-point">
                        <strong>2. Process Innovation</strong>
                        <p>Implementation of a new or significantly improved production or delivery method.</p>
                        <ul>
                            <li>Includes significant changes in techniques, equipment, software</li>
                            <li>Example: Toyota's lean manufacturing</li>
                        </ul>
                    </div>
                    <div class="key-point">
                        <strong>3. Marketing Innovation</strong>
                        <p>Implementation of a new marketing method involving significant changes in product design, packaging, placement, promotion or pricing.</p>

                            <li>Example: Coca-Cola's distinctive bottle design</li>
                        </ul>

                            <li>Example: Google's 20% time policy</li>

                details: `
                    <h2>Causation vs. Effectuation</h2>
                    <img src="https://user-gen-media-assets.s3.amazonaws.com/seedream_images/db91eb27-8570-4fb7-8a0a-2031487bc0f5.png" alt="Causation vs Effectuation" style="width: 100%; max-width: 600px; margin: 1rem auto; display: block; border-radius: 8px;">
                    <div class="key-point">
                        <strong>Causation Logic</strong>
                        <ul>
                            <li>Goal-driven: Start with predetermined goals</li>
                            <li>Prediction-focused: Predict the future to control it</li>
                            <li>Comprehensive planning before action</li>
                            <li>Competitive analysis to maximize returns</li>
                            <li>Suitable for: Existing markets, known environments</li>
                        </ul>
                    </div>
                    <div class="key-point">
                        <strong>Effectuation Logic (Sarasvathy)</strong>
                        <ul>
                            <li>Means-driven: Start with available means (who you are, what you know, whom you know)</li>
                            <li>Control-focused: Control the future by creating it</li>
                            <li>Affordable loss principle instead of expected returns</li>
                            <li>Strategic partnerships over competitive analysis</li>
                            <li>Suitable for: New markets, uncertain environments</li>
                        </ul>
                    </div>
                    <div class="key-point">

                            <li><strong>Crazy quilt:</strong> Build partnerships</li>

                    <h2>Business Model Canvas (Osterwalder & Pigneur 2010)</h2>
                    <p><strong>Purpose:</strong> Strategic tool to analyze, design and innovate business models</p>
                    <img src="https://user-gen-media-assets.s3.amazonaws.com/seedream_images/ffd82c61-511c-4f64-946a-12985fe001e8.png" alt="Business Model Canvas" style="width: 100%; max-width: 700px; margin: 1rem auto; display: block; border-radius: 8px;">
                    
                    <div class="key-point">
                        <strong>9 Building Blocks</strong>
                        <ol>
                            <li><strong>Customer Segments:</strong> Who are you serving? Different groups with distinct needs</li>
                            <li><strong>Value Propositions:</strong> What value do you deliver? Solutions to customer problems</li>
                            <li><strong>Channels:</strong> How do you reach customers? Distribution and communication channels</li>

                        <ul>

                        <ul>
                            <li><strong>Pivot:</strong> Structured course correction to test new hypothesis</li>

                    <h2>Disruptive Innovation Theory (Clayton Christensen)</h2>
                    
                    <div class="key-point">
                        <strong>Sustaining vs. Disruptive Innovation</strong>
                        <ul>
                            <li><strong>Sustaining:</strong> Improvements along established performance trajectories</li>
                            <li><strong>Disruptive:</strong> Initially inferior but improves to eventually overtake incumbents</li>
                        </ul>

                    <div class="key-point">
                        <strong>Two Types of Disruption</strong>
                        <ol>
                            <li><strong>Low-end disruption:</strong> Target over-served customers with "good enough" solutions at lower prices</li>
                            <li><strong>New-market disruption:</strong> Create new market by serving non-consumers</li>
                        </ol>
                    </div>
                    
                    <div class="key-point">
                        <strong>Why Incumbents Fail</strong>
                        <ul>
                            <li>Listen to best customers who don't want disruptive products initially</li>
                            <li>Rational decision-making leads to ignoring low-margin opportunities</li>
                            <li>Existing value networks constrain response</li>
                            <li>Focus on sustaining innovations for current customers</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Examples</strong>
                        <ul>
                            <li>Netflix disrupting Blockbuster (streaming vs. rental stores)</li>

                            <li>Personal computers disrupting mainframes</li>
                            <li>Online education disrupting traditional universities</li>

                        <strong>Strategies for Incumbents</strong>

                    <p><strong>Purpose:</strong> Quick screening tool for new business opportunities</p>

                        <ul>
                            <li><strong>Customer Need:</strong> What problem does it solve? (Basic, Spoken, Unspoken needs)</li>

                            <li><strong>Market Size:</strong> TAM, SAM, SOM (Total/Serviceable/Obtainable Market)</li>
                            <li><strong>Market Share:</strong> What share is realistically attainable?</li>
                            <li><strong>Barriers to Entry:</strong> Economies of scale, switching costs, IP, capital requirements</li>

                        <ul>
                            <li><strong>Investment Requirement:</strong> How much capital needed?</li>
                            <li><strong>VC Rule of Thumb:</strong> For every $1 technical development, need $8 more ($5 marketing, $3 legal/admin)</li>
                            <li><strong>Fixed vs. Variable Costs:</strong> Minimize fixed costs in early stages</li>
                            <li><strong>Gross Profit Margin:</strong> Key indicator - higher margins = faster to break-even</li>
                            <li><strong>Break-Even:</strong> When does revenue = costs?</li>
                            <li><strong>Cash Flow:</strong> How quickly do customers pay?</li>
                            <li><strong>ROI/IRR:</strong> Expected returns for investors</li>
                        </ul>

                        <strong>3. MANAGEMENT</strong>
                        <ul>
                            <li><strong>Value-Adding Potential:</strong> Can you keep innovating?</li>
                            <li><strong>Resource Control:</strong> Access to necessary IP, assets, skills</li>

                    <h2>Porter's Five Forces Model</h2>
                    <p><strong>Purpose:</strong> Analyze competitive intensity and profitability of industry</p>

                    <div class="key-point">
                        <strong>1. Threat of New Entry</strong>
                        <ul>
                            <li>Time and cost of entry</li>
                            <li>Specialist knowledge requirements</li>
                            <li>Economies of scale</li>
                            <li>Cost advantages of incumbents</li>
                            <li>Technology protection (patents, IP)</li>
                            <li>Barriers to entry (capital, regulations)</li>
                        </ul>

                        <strong>2. Competitive Rivalry</strong>
                        <ul>
                            <li>Number and capability of competitors</li>
                            <li>Quality and differentiation</li>
                            <li>Switching costs for customers</li>
                            <li>Customer loyalty</li>
                            <li>Costs of leaving market</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>3. Supplier Power</strong>
                        <ul>
                            <li>Number and size of suppliers</li>
                            <li>Uniqueness of service/product</li>
                            <li>Your ability to substitute</li>
                            <li>Cost of changing suppliers</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>4. Buyer Power</strong>
                        <ul>
                            <li>Number and size of customers</li>
                            <li>Size of each order</li>
                            <li>Differences between competitors</li>
                            <li>Price sensitivity</li>
                            <li>Ability to substitute</li>
                            <li>Cost of changing suppliers</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>5. Threat of Substitutes</strong>
                        <ul>
                            <li>Alternative products/services performance</li>
                            <li>Cost of switching to substitute</li>
                            <li>Buyer willingness to substitute</li>
                        </ul>

                        <strong>Application</strong>

                            <li>Challenges: Access to finance, limited networks outside community</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Women's Entrepreneurship</strong>
                        <ul>
                            <li>Growing globally but still underrepresented</li>
                            <li>Face challenges: Access to finance, networks, family responsibilities</li>
                            <li>Often in service sectors vs. high-tech</li>
                            <li>Different motivations: Flexibility, work-life balance important</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Student Entrepreneurship</strong>
                        <ul>
                            <li>Universities as incubators</li>
                            <li>Benefits: Learning opportunity, low opportunity cost</li>
                            <li>Challenges: Limited experience, resources, credibility</li>
                            <li>Support programs: Competitions, accelerators, courses</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Green/Sustainable Entrepreneurship</strong>
                        <ul>
                            <li>Ventures with environmental sustainability core to mission</li>
                            <li>Addresses climate change, resource depletion, pollution</li>
                            <li>Examples: Renewable energy, circular economy, sustainable agriculture</li>
                            <li>Challenges: Higher costs, longer payback, regulatory uncertainty</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Everyday Entrepreneurship (Welter et al. 2017)</strong>
                        <ul>
                            <li>Not confined to high-growth tech startups</li>
                            <li>Includes: Small businesses, self-employment, side hustles</li>
                            <li>Important for economy and employment</li>
                            <li>Diverse motivations and outcomes</li>
                            <li>Broader view recognizes entrepreneurship as pervasive phenomenon</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Context Matters</strong>
                        <ul>
                            <li>Geographic location (developed vs. developing economies)</li>
                            <li>Institutional environment (regulations, support, culture)</li>
                            <li>Industry sector</li>
                            <li>Personal circumstances (age, education, resources)</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Implications for Support</strong>
                        <ul>
                            <li>One-size-fits-all policies don't work</li>
                            <li>Need tailored support for different groups</li>
                            <li>Address specific barriers (finance, networks, skills)</li>
                            <li>Recognize different definitions of success</li>
                        </ul>
                    </div>
                    <div class="key-point" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-left: 4px solid #3b82f6; margin-top: 2rem;">
                        <strong style="color: #1e40af; font-size: 1.1rem;">📚 Learn More</strong>
                        <ul style="margin-top: 0.75rem;">
                            <li><strong>Article:</strong> <a href="https://scholar.google.com/scholar?q=Welter+2017+everyday+entrepreneurship" target="_blank" rel="noopener noreferrer" style="color: #3b82f6; text-decoration: underline;">Welter et al. (2017) - Everyday entrepreneurship</a></li>
                            <li><strong>Textbook:</strong> <a href="#" onclick="openSource('file:2', 368); return false;" style="color: #3b82f6; text-decoration: underline;">Trott - Innovation & Entrepreneurship</a>, Chapter 10 (pp. 342-348)</li>
                            <li><strong>Lecture:</strong> <a href="#" onclick="openSource('file:4', 36); return false;" style="color: #3b82f6; text-decoration: underline;">Lecture 2 - The Entrepreneur</a> (Slides 36-42)</li>
                        </ul>
                    </div>
                `
            },
            {
                id: 25,
                title: "Business Model Innovation",
                category: "business-models",
                badge: "theory",
                summary: "Changing how value is created, delivered, and captured",
                details: `
                    <h2>Business Model Innovation (Foss & Saebi 2017)</h2>
                    
                    <div class="key-point">
                        <strong>Definition</strong>
                        <p>Designed, novel, non-trivial changes to key elements of firm's business model and/or architecture linking these elements</p>
                    </div>
                    
                    <div class="key-point">
                        <strong>Types of Changes</strong>
                        <ul>
                            <li><strong>Modular:</strong> Change one component (e.g., new revenue model)</li>
                            <li><strong>Architectural:</strong> Change relationships between components</li>
                            <li><strong>Radical:</strong> Transform multiple components simultaneously</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Why Innovate Business Models?</strong>
                        <ul>
                            <li>Technology change (digitalization, AI, platforms)</li>
                            <li>Market changes (new customer needs, globalization)</li>
                            <li>Competitive pressures (disruption threats)</li>
                            <li>Regulatory changes</li>
                            <li>Sustainability imperatives</li>
                            <li>Growth opportunities (new markets, segments)</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Examples</strong>
                        <ul>
                            <li><strong>Netflix:</strong> DVD rental → Streaming subscription</li>
                            <li><strong>Nespresso:</strong> Coffee machines + capsule subscription</li>
                            <li><strong>Airbnb:</strong> Asset-light accommodation platform</li>
                            <li><strong>Rolls-Royce:</strong> Sell engines → "Power by the hour"</li>
                            <li><strong>Spotify:</strong> Freemium + Premium subscriptions</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Process (Taran et al. 2013)</strong>
                        <ol>
                            <li><strong>Initiation:</strong> Trigger events, opportunity identification</li>
                            <li><strong>Ideation:</strong> Generate alternative business model concepts</li>
                            <li><strong>Integration:</strong> Design detailed business model</li>
                            <li><strong>Implementation:</strong> Execute and refine</li>
                            <li>Risk management throughout</li>
                        </ol>
                    </div>
                    
                    <div class="key-point">
                        <strong>Challenges</strong>
                        <ul>
                            <li>Cannibalization of existing business</li>
                            <li>Organizational resistance and inertia</li>
                            <li>Requires different capabilities and resources</li>
                            <li>Uncertainty about customer acceptance</li>
                            <li>Complexity of managing two models simultaneously</li>
                        </ul>
                    </div>
                    
                    <div class="key-point">
                        <strong>Success Factors</strong>
                        <ul>
                            <li>Top management support</li>
                            <li>Experimentation and learning orientation</li>
                            <li>Customer involvement</li>
                            <li>Ambidextrous organization (separate unit for new model)</li>
                            <li>Willingness to cannibalize existing business</li>
                        </ul>
                    </div>
                    <div class="key-point" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-left: 4px solid #3b82f6; margin-top: 2rem;">
                        <strong style="color: #1e40af; font-size: 1.1rem;">📚 Learn More</strong>
                        <ul style="margin-top: 0.75rem;">
                            <li><strong>Article:</strong> <a href="https://scholar.google.com/scholar?q=Foss+Saebi+2017+business+model+innovation" target="_blank" rel="noopener noreferrer" style="color: #3b82f6; text-decoration: underline;">Foss &amp; Saebi (2017) - Business model innovation</a></li>
                            <li><strong>Textbook:</strong> <a href="#" onclick="openSource('file:2', 358); return false;" style="color: #3b82f6; text-decoration: underline;">Trott - Innovation & Entrepreneurship</a>, Chapter 10 (pp. 332-335)</li>
                            <li><strong>Lecture:</strong> <a href="#" onclick="openSource('file:7', 33); return false;" style="color: #3b82f6; text-decoration: underline;">Lecture 3 - Business Models</a> (Slides 33-40)</li>
                        </ul>
                    </div>
                `
            }
        ];

        let filteredTopics = [...topics];

        function renderTopics(topicsToRender) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            topicsToRender.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showModal(topic);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="card-title">${topic.title}</div>
                        </div>
                        <span class="card-badge badge-${topic.badge}">${topic.badge}</span>
                    </div>
                    <div class="card-content">
                        <p>${topic.summary}</p>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            document.getElementById('totalTopics').textContent = topicsToRender.length;
        }

        function showModal(topic) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = topic.details;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const category = btn.dataset.category;
                if (category === 'all') {
                    filteredTopics = [...topics];
                } else {
                    filteredTopics = topics.filter(t => t.category === category);
                }
                
                renderTopics(filteredTopics);
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const activeCategory = document.querySelector('.tab-btn.active').dataset.category;
            
            let baseTopics = activeCategory === 'all' ? topics : topics.filter(t => t.category === activeCategory);
            
            const searchResults = baseTopics.filter(topic => 
                topic.title.toLowerCase().includes(searchTerm) ||
                topic.summary.toLowerCase().includes(searchTerm) ||
                topic.details.toLowerCase().includes(searchTerm)
            );
            
            renderTopics(searchResults);
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        function openSource(fileId, page) {
            const githubRepo = 'https://raw.githubusercontent.com/ilumik/ieb-exam-dashboard/main';
            const fileMeta = {
                'file:2': { name: 'Trott – Entrepreneurship and Innovation', file: 'Entrepreneurship and innovation.pdf' },
                'file:3': { name: 'Lecture 1 – Introduction to Innovation', file: 'IEB 1 cro 2026_moodle.pdf' },
                'file:4': { name: 'Lecture 2 – The Entrepreneur', file: 'HA 4sem 2026 lecture 2 The entrepreneur stud.pdf' },
                'file:5': { name: 'Oslo Manual 2018', file: 'Oslo manual.pdf' },
                'file:6': { name: 'Wright & Zahra (2011) – Dark Side of Entrepreneurship', file: 'Wright Zahra Dark side of entrepreneurship 2011 IEB.pdf' },
                'file:7': { name: 'Lecture 3 – Business Models', file: 'IEB 3 cro 2026 moodle.pdf' },
                'file:8': { name: 'Blank & Eckhardt (2023) – The Lean Startup as Actionable Theory', file: 'blank-eckhardt-2023-the-lean-startup-as-an-actionable-theory-of-entrepreneurship.pdf' },
                'file:9': { name: 'Lecture 4 – Entrepreneurship in Practice', file: 'HA 4sem 2026 lecture 4 Entr in practice Bus Plans stud.pdf' },
                'file:10': { name: 'Haag (2013) – Writing a Successful Business Plan', file: 'haag-2013-writing-a-successful-business-plan-an-overview.pdf' }
            };

            const meta = fileMeta[fileId];
            if (!meta) { alert('File not found.'); return; }

            const rawUrl = `${githubRepo}/resources/${encodeURIComponent(meta.file)}`;
            const pdfJsBase = 'https://mozilla.github.io/pdf.js/web/viewer.html';
            const pageHash = page ? `#page=${page}` : '';
            const viewerUrl = `${pdfJsBase}?file=${encodeURIComponent(rawUrl)}${pageHash}`;

            const modal = document.getElementById('pdfModal');
            const iframe = document.getElementById('pdfIframe');
            const fallback = document.getElementById('pdfFallback');
            const openNewTab = document.getElementById('pdfOpenNewTab');
            const title = document.getElementById('pdfModalTitle');

            title.textContent = meta.name + (page ? ` — p. ${page}` : '');
            openNewTab.href = viewerUrl;

            iframe.src = viewerUrl;
            iframe.classList.remove('hidden');
            fallback.classList.add('hidden');

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePdfModal() {
            const modal = document.getElementById('pdfModal');
            const iframe = document.getElementById('pdfIframe');
            modal.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }


        document.getElementById('pdfModal').addEventListener('click', (e) => {
            if (e.target.id === 'pdfModal') closePdfModal();
        });
        renderTopics(topics);
    </script>

    <!-- PDF/File Viewer Modal -->
    <div class="pdf-modal" id="pdfModal">
        <div class="pdf-modal-content">
            <div class="pdf-modal-header">
                <span class="pdf-modal-title" id="pdfModalTitle">Source</span>
                <div class="pdf-modal-actions">
                    <a id="pdfOpenNewTab" href="#" target="_blank" rel="noopener noreferrer" class="pdf-open-btn">
                        ↗ Open in new tab
                    </a>
                    <button class="pdf-modal-close" onclick="closePdfModal()">×</button>
                </div>
            </div>
            <iframe class="pdf-iframe" id="pdfIframe" src="" title="Source viewer"></iframe>
            <div class="pdf-fallback hidden" id="pdfFallback">
                <p>This file type cannot be previewed in the browser.</p>
                <a id="pdfFallbackLink" href="#" target="_blank" rel="noopener noreferrer" class="pdf-open-btn">↗ Open / Download file</a>
            </div>
        </div>
    </div>

</body>
